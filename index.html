<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESTOQUE DO ESTÚDIO RICK TATUADOR</title>

<style>
body{font-family:Arial;background:#f2f2f2;margin:0;padding:10px;transition:0.3s}
h1{text-align:center}
.box{background:#fff;padding:10px;margin-bottom:10px;border-radius:8px}
input,select,button{width:100%;padding:8px;margin:4px 0}
.item{display:flex;justify-content:space-between;align-items:center}
.controls button{width:auto;margin-left:4px}
.zero{color:red;font-weight:bold}
.low{color:orange;font-weight:bold}
.highlight{background:#ffff99;border-radius:4px}
.footer{margin-top:20px;text-align:center;color:#555;font-size:14px}
.clear-btn{margin-top:4px;background:#f44336;color:white;border:none;padding:6px 8px;border-radius:4px;cursor:pointer}
.dark{background:#121212;color:#f2f2f2}
.dark .box{background:#1e1e1e}
.dark input,.dark select,.dark button{
background:#2a2a2a;color:white;border:1px solid #444
}

.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#000000cc;
z-index:9999;
}
.modal-content{
background:#fff;
margin:20px;
padding:15px;
border-radius:10px;
}
</style>
</head>

<body>

<script>
let user = localStorage.getItem("usuarioLogado");
while(!user){
  user = prompt("Digite seu nome:");
  if(user) localStorage.setItem("usuarioLogado", user);
}
</script>

<h1>ESTOQUE DO ESTÚDIO RICK TATUADOR</h1>

<button onclick="abrirDecalque()">🖋️ Gerador de Decalque</button>

<div class="box">
<input id="search" placeholder="🔍 Pesquisar produto">
<button onclick="buscarProduto()">Pesquisar</button>
</div>

<div class="box">
<select id="catSelect"></select>
<input id="newCat" placeholder="Ou nova categoria">
<input id="newName" placeholder="Produto">
<input id="newQty" type="number" placeholder="Quantidade">
<button onclick="addProduct()">Adicionar</button>
</div>

<div id="stock"></div>

<div class="box">
<h3>📜 Histórico de Adições</h3>
<div id="histAdd"></div>
</div>

<div class="box">
<h3>📜 Histórico de Remoções</h3>
<div id="histRem"></div>
</div>

<!-- MODAL IA -->
<div id="modal" class="modal">
<div class="modal-content">

<button onclick="fecharDecalque()">Fechar</button>

<h2>Gerador de Decalque</h2>

<input type="file" id="upload">
<button onclick="gerar()">Gerar</button>

<img id="resultado" style="width:100%;margin-top:10px">

<button onclick="baixar()">Baixar</button>

<div id="status"></div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "SEU_DOMINIO",
  projectId: "SEU_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let data = {};
let history = { adicoes: [], remocoes: [] };
let lastFound = null;

onSnapshot(doc(db,"estoque","principal"), snap=>{
  if(snap.exists()){ data = snap.data().data || {}; render(); }
});
onSnapshot(doc(db,"estoque","history"), snap=>{
  if(snap.exists()){ history = snap.data(); renderHistory(); }
});

async function save(){
  await setDoc(doc(db,"estoque","principal"),{data});
  await setDoc(doc(db,"estoque","history"),history);
}

window.addProduct = async ()=>{
  let cat = newCat.value || catSelect.value;
  if(!cat || !newName.value) return alert("Preencha tudo");
  if(!data[cat]) data[cat]={};
  data[cat][newName.value]=parseInt(newQty.value)||0;
  history.adicoes.unshift(`➕ ${newName.value} (${user}) - ${new Date().toLocaleString()}`);
  newCat.value=newName.value=newQty.value="";
  await save();
};

window.changeQty = async (cat,prod,delta)=>{
  data[cat][prod]+=delta;
  if(data[cat][prod]<0) data[cat][prod]=0;
  const msg=`${delta>0?'➕':'➖'} ${prod} (${user}) - ${new Date().toLocaleString()}`;
  delta>0?history.adicoes.unshift(msg):history.remocoes.unshift(msg);
  await save();
};

window.buscarProduto = ()=>{
  const termo=search.value.toLowerCase();
  if(lastFound) lastFound.classList.remove("highlight");
  const el=[...document.querySelectorAll('[data-prod]')]
  .find(d=>d.dataset.prod.includes(termo));
  if(el){
    el.scrollIntoView({behavior:"smooth",block:"center"});
    el.classList.add("highlight"); lastFound=el;
  }else alert("Produto não encontrado");
};

function render(){
  stock.innerHTML=""; catSelect.innerHTML="";
  Object.keys(data).forEach(cat=>{
    catSelect.innerHTML+=`<option>${cat}</option>`;
    let b=document.createElement("div");
    b.className="box";
    b.innerHTML=`<h3>${cat}</h3>`;
    Object.keys(data[cat]).forEach(p=>{
      let q=data[cat][p];
      let cls=q===0?"zero":q<5?"low":"";
      b.innerHTML+=`
      <div class="item" data-prod="${p.toLowerCase()}">
      <span class="${cls}">${p}: ${q}</span>
      <span class="controls">
      <button onclick="changeQty('${cat}','${p}',-1)">−</button>
      <button onclick="changeQty('${cat}','${p}',1)">+</button>
      </span></div>`;
    });
    stock.appendChild(b);
  });
}

function renderHistory(){
  histAdd.innerHTML=history.adicoes.map(h=>`<div>${h}</div>`).join("");
  histRem.innerHTML=history.remocoes.map(h=>`<div>${h}</div>`).join("");
}

/* IA */

const TOKEN = "r8_XJp1c28FjvR7QFNNysQdv66lkKCmDHF3uYT6g";

window.abrirDecalque = ()=> modal.style.display="block";
window.fecharDecalque = ()=> modal.style.display="none";

function toBase64(file){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.readAsDataURL(file);
    reader.onload=()=>resolve(reader.result);
  });
}

window.gerar = async ()=>{
  const file = upload.files[0];
  if(!file) return alert("Escolha uma imagem");

  status.innerText="Processando...";

  try{
    const base64 = await toBase64(file);

    const response = await fetch("https://api.replicate.com/v1/predictions",{
      method:"POST",
      headers:{
        "Authorization":"Token "+TOKEN,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        version:"stability-ai/sdxl",
        input:{
          image:base64,
          prompt:"tattoo stencil, black lines"
        }
      })
    });

    const data = await response.json();
    verificar(data.id);

  }catch(e){
    status.innerText="Erro";
  }
};

async function verificar(id){
  let pronto=false;
  while(!pronto){
    const res = await fetch(`https://api.replicate.com/v1/predictions/${id}`,{
      headers:{ "Authorization":"Token "+TOKEN }
    });
    const data = await res.json();

    if(data.status==="succeeded"){
      resultado.src=data.output[0];
      status.innerText="Pronto!";
      pronto=true;
    }

    if(data.status==="failed"){
      status.innerText="Erro";
      break;
    }

    await new Promise(r=>setTimeout(r,2000));
  }
}

window.baixar = ()=>{
  if(!resultado.src) return alert("Nada gerado");
  const a=document.createElement("a");
  a.href=resultado.src;
  a.download="decalque.png";
  a.click();
};
</script>

</body>
</html>
