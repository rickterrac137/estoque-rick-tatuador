<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESTOQUE DO ESTÚDIO RICK TATUADOR</title>

<style>
body{font-family:Arial;background:#f2f2f2;margin:0;padding:10px;transition:0.3s}
h1{text-align:center}
.box{background:#fff;padding:10px;margin-bottom:10px;border-radius:8px}
input,select,button{width:100%;padding:8px;margin:4px 0}
button{cursor:pointer;transition:0.2s}
button:active{transform:scale(0.95)}
.item{display:flex;justify-content:space-between;align-items:center}
.controls button{width:auto;margin-left:4px}
.zero{color:red;font-weight:bold}
.low{color:orange;font-weight:bold}
.highlight{background:#ffff99;border-radius:4px}
.footer{margin-top:20px;text-align:center;color:#555;font-size:14px}
.clear-btn{margin-top:4px;background:#f44336;color:white;border:none;padding:6px 8px;border-radius:4px}
.dark{background:#121212;color:#f2f2f2}
.dark .box{background:#1e1e1e}
.dark input,.dark select,.dark button{background:#2a2a2a;color:white;border:1px solid #444}
.update-alert{background:#ff9800;color:#000;padding:8px;border-radius:6px;margin-bottom:10px;cursor:pointer;font-weight:bold}

/* MODAL IA */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#000000cc;
z-index:9999;
overflow:auto;
}
.modal-content{
background:#fff;
margin:20px;
padding:15px;
border-radius:10px;
}
</style>
</head>

<body>

<div id="userBox" class="box"></div>

<button onclick="abrirDecalque()">🖋️ Gerador de Decalque</button>

<div id="updateBox"></div>

<h1>ESTOQUE DO ESTÚDIO RICK TATUADOR</h1>

<div class="box">
<input id="search" placeholder="🔍 Pesquisar produto">
<button id="btnSearch">Pesquisar</button>
</div>

<div class="box">
<select id="catSelect"></select>
<input id="newCat" placeholder="Ou nova categoria">
<input id="newName" placeholder="Produto">
<input id="newQty" type="number" placeholder="Quantidade">
<button id="btnAdd">Adicionar</button>
</div>

<div id="stock"></div>

<div class="box">
<h3>📜 Histórico de Adições</h3>
<div id="histAdd"></div>
<button id="clearHistBtnAdd" class="clear-btn">Limpar Histórico</button>
</div>

<div class="box">
<h3>📜 Histórico de Remoções</h3>
<div id="histRem"></div>
<button id="clearHistBtnRem" class="clear-btn">Limpar Histórico</button>
</div>

<!-- MODAL IA -->
<div id="modal" class="modal">
<div class="modal-content">

<button onclick="fecharDecalque()">❌ Fechar</button>

<h2>🖋️ Gerador de Decalque IA</h2>

<input type="file" id="upload">
<button onclick="gerar()">Gerar Decalque</button>

<img id="resultado" style="width:100%;margin-top:10px">

<button onclick="baixar()">⬇️ Baixar</button>

<div id="status"></div>

</div>
</div>

<div class="footer" id="footer"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPF8DpKpIHpYsdTRNCgHgiwCqUcosLX6c",
  authDomain: "estoque-rick-tatuador.firebaseapp.com",
  projectId: "estoque-rick-tatuador",
  storageBucket: "estoque-rick-tatuador.firebasestorage.app",
  messagingSenderId: "446550868475",
  appId: "1:446550868475:web:2a2ba89ccc5a076fcacb5e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let data = {};
let history = { adicoes: [], remocoes: [] };
let lastFound = null;

window.onload = async () => {

  const newCat = document.getElementById("newCat");
  const newName = document.getElementById("newName");
  const newQty = document.getElementById("newQty");
  const catSelect = document.getElementById("catSelect");
  const search = document.getElementById("search");

  let user = localStorage.getItem("usuarioLogado");
  while(!user){
    user = prompt("Digite seu nome:");
    if(user) localStorage.setItem("usuarioLogado", user);
  }

  userBox.innerHTML = `Usuário logado: <b>${user}</b>`;

  onSnapshot(doc(db,"estoque","principal"), snap=>{
    if(snap.exists()){ data = snap.data().data || {}; renderStock(); }
  });

  onSnapshot(doc(db,"estoque","history"), snap=>{
    if(snap.exists()){ history = snap.data() || {adicoes:[],remocoes:[]}; renderHistory(); }
  });

  async function save(){
    await setDoc(doc(db,"estoque","principal"),{data});
    await setDoc(doc(db,"estoque","history"),history);
  }

  function renderStock(){
    stock.innerHTML=""; catSelect.innerHTML="";
    Object.keys(data).forEach(cat=>{
      catSelect.innerHTML+=`<option>${cat}</option>`;
      let box=document.createElement("div");
      box.className="box";
      box.innerHTML=`<h3>${cat}
        <button class="editCat">✏️</button>
        <button class="delCat">🗑️</button>
      </h3>`;
      Object.keys(data[cat]).forEach(p=>{
        let q=data[cat][p];
        let cls=q===0?"zero":q<5?"low":"";
        const div = document.createElement("div");
        div.className="item";
        div.dataset.prod = p.toLowerCase();
        div.innerHTML = `<span class="${cls}">${p}: ${q}</span>
        <span class="controls">
          <button class="minusBtn">−</button>
          <button class="plusBtn">+</button>
          <button class="editProd">✏️</button>
          <button class="delProd">🗑️</button>
        </span>`;
        box.appendChild(div);

        div.querySelector(".minusBtn").addEventListener("click", ()=>changeQty(cat,p,-1));
        div.querySelector(".plusBtn").addEventListener("click", ()=>changeQty(cat,p,1));
        div.querySelector(".editProd").addEventListener("click", ()=>editProduct(cat,p));
        div.querySelector(".delProd").addEventListener("click", ()=>deleteProduct(cat,p));
      });

      stock.appendChild(box);

      box.querySelector(".editCat").addEventListener("click", ()=>editCategory(cat));
      box.querySelector(".delCat").addEventListener("click", ()=>deleteCategory(cat));
    });
  }

  async function changeQty(cat,prod,delta){
    data[cat][prod]=(data[cat][prod]||0)+delta;
    if(data[cat][prod]<0) data[cat][prod]=0;
    const msg=`${delta>0?'➕':'➖'} ${prod} (${user}) - ${new Date().toLocaleString()}`;
    delta>0?history.adicoes.unshift(msg):history.remocoes.unshift(msg);
    await save();
  }

  window.editCategory = async cat=>{
    let n=prompt("Novo nome:",cat);
    if(!n||n===cat) return;
    data[n]=data[cat]; delete data[cat]; await save();
  };

  window.deleteCategory = async cat=>{
    if(!confirm("Excluir categoria?")) return;
    delete data[cat]; await save();
  };

  window.editProduct = async (cat,prod)=>{
    let n=prompt("Novo nome:",prod);
    if(!n||n===prod) return;
    data[cat][n]=data[cat][prod]; delete data[cat][prod]; await save();
  };

  window.deleteProduct = async (cat,prod)=>{
    if(!confirm("Excluir produto?")) return;
    delete data[cat][prod]; await save();
  };

  /* ===== IA ===== */

  const TOKEN = "r8_XJp1c28FjvR7QFNNysQdv66lkKCmDHF3uYT6g";

  window.abrirDecalque = ()=> modal.style.display="block";
  window.fecharDecalque = ()=> modal.style.display="none";

  function toBase64(file){
    return new Promise(resolve=>{
      const reader=new FileReader();
      reader.readAsDataURL(file);
      reader.onload=()=>resolve(reader.result);
    });
  }

  window.gerar = async ()=>{
    const file = upload.files[0];
    if(!file) return alert("Escolha uma imagem");

    status.innerText="Processando...";

    try{
      const base64 = await toBase64(file);

      const response = await fetch("https://api.replicate.com/v1/predictions",{
        method:"POST",
        headers:{
          "Authorization":"Token "+TOKEN,
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
          version:"stability-ai/sdxl",
          input:{
            image:base64,
            prompt:"tattoo stencil, black lines, high contrast"
          }
        })
      });

      const dataIA = await response.json();
      verificar(dataIA.id);

    }catch(e){
      status.innerText="Erro";
      console.error(e);
    }
  };

  async function verificar(id){
    let pronto=false;
    while(!pronto){
      const res = await fetch(`https://api.replicate.com/v1/predictions/${id}`,{
        headers:{ "Authorization":"Token "+TOKEN }
      });
      const data = await res.json();

      if(data.status==="succeeded"){
        resultado.src=data.output[0];
        status.innerText="Pronto!";
        pronto=true;
      }

      if(data.status==="failed"){
        status.innerText="Erro ao gerar";
        break;
      }

      await new Promise(r=>setTimeout(r,2000));
    }
  }

  window.baixar = ()=>{
    if(!resultado.src) return alert("Nada gerado");
    const a=document.createElement("a");
    a.href=resultado.src;
    a.download="decalque.png";
    a.click();
  };

};
</script>

</body>
</html>
